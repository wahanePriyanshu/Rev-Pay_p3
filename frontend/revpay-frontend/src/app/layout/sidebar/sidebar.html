<div class="sidebar sidebar-dark sidebar-fixed" [ngClass]="{'sidebar-hide': !isOpen}">

  <div class="sidebar-content">
    <ul class="sidebar-nav">

      <li class="nav-item">
        <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
          <i class="ti ti-layout-dashboard nav-icon"></i>
          Dashboard
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link" [routerLink]="['/wallet']" routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }">
          <i class="ti ti-wallet nav-icon"></i>
          Wallet
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link" routerLink="/transactions" routerLinkActive="active">
          <i class="ti ti-arrows-exchange nav-icon"></i>
          Transactions
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link" routerLink="/notifications" routerLinkActive="active">
          <i class="ti ti-bell nav-icon"></i>
          Notifications
        </a>
      </li>

      <!-- Business-only links -->
      <li class="nav-item" *ngIf="isBusiness">
        <a class="nav-link" routerLink="/invoices" routerLinkActive="active">
          <i class="ti ti-file-invoice nav-icon"></i>
          Invoices
        </a>
      </li>

      <li class="nav-item" *ngIf="isBusiness">
        <a class="nav-link" routerLink="/loans" routerLinkActive="active">
          <i class="ti ti-building-bank nav-icon"></i>
          Loans
        </a>
      </li>

      <li class="nav-item" *ngIf="isBusiness">
        <a class="nav-link" routerLink="/customers" routerLinkActive="active">
          <i class="ti ti-users nav-icon"></i>
          Customers
        </a>
      </li>

    </ul>
  </div>

  <!-- Profile section at bottom -->
  <div class="sidebar-footer">
    <button class="profile-toggle" type="button" (click)="toggleProfileMenu()">
      <div class="avatar-circle">{{ avatarInitials }}</div>
      <div class="profile-text">
        <div class="name">{{ displayName }}</div>
        <div class="subtitle">View profile</div>
      </div>
      <i class="ti ti-chevron-down chevron" [ngClass]="{ 'open': showProfileMenu }"></i>
    </button>

    <div class="profile-menu" *ngIf="showProfileMenu">
      <button type="button" class="menu-item" (click)="goToProfile()">
        <i class="ti ti-user me-2"></i>Profile
      </button>
      <button type="button" class="menu-item text-danger" (click)="logout()">
        <i class="ti ti-logout me-2"></i>Logout
      </button>
    </div>
  </div>

</div>
