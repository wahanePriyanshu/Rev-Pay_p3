server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service-docs
          uri: http://localhost:8081
          predicates:
            - Path=/user-service/**
          filters:
            - RewritePath=/user-service/(?<segment>.*), /${segment}

        - id: wallet-service-docs
          uri: http://localhost:8082
          predicates:
            - Path=/wallet-service/**
          filters:
            - RewritePath=/wallet-service/(?<segment>.*), /${segment}

        - id: user-service-api
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**,/api/profile/**,/api/business/**,/api/health/**

        - id: wallet-service-api
          uri: http://localhost:8082
          predicates:
            - Path=/api/wallet/**
            
        - id: transaction-service-docs
          uri: http://localhost:8083
          predicates:
            - Path=/transaction-service/**
          filters:
            - RewritePath=/transaction-service/(?<segment>.*), /${segment}

        - id: transaction-service-api
          uri: http://localhost:8083
          predicates:
            - Path=/api/transfer/**,/api/requests/**,/api/transactions/**
          
        - id: transaction-service-api
          uri: http://localhost:8083
          predicates:
            - Path=/api/transfer/**,/api/requests/**,/api/transactions/**,/api/activity/** 
           
        - id: invoice-service-docs
          uri: http://localhost:8084
          predicates:
            - Path=/invoice-service/**
          filters:
            - RewritePath=/invoice-service/(?<segment>.*), /${segment}

        - id: invoice-service-api
          uri: http://localhost:8084
          predicates:
            - Path=/api/invoices/**,/api/customers/**  
           
            

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

springdoc:
  swagger-ui:
    urls:
      - name: user-service
        url: /user-service/v3/api-docs
      - name: wallet-service
        url: /wallet-service/v3/api-docs
      - name: transaction-service
        url: /transaction-service/v3/api-docs
      - name: invoice-service
        url: /invoice-service/v3/api-docs  